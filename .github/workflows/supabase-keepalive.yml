name: Supabase Keep Alive

on:
  schedule:
    # Runs every 12 hours (completely safe for the 7-day limit and saves GitHub minutes)
    - cron: '0 */12 * * *' 
  workflow_dispatch: # Allows you to trigger it manually

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/node@v4
        with:
          node-level: '20'

      - name: Install Supabase Client
        run: npm install @supabase/supabase-js

      - name: Execute Live Database Transaction
        env:
          # Project 1 Secrets
          SUPABASE_URL_1: ${{ secrets.SUPABASE_URL_1 }}
          SUPABASE_SERVICE_ROLE_KEY_1: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_1 }}
          # Project 2 Secrets
          SUPABASE_URL_2: ${{ secrets.SUPABASE_URL_2 }}
          SUPABASE_SERVICE_ROLE_KEY_2: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_2 }}
        run: |
          node -e "
          const { createClient } = require('@supabase/supabase-js');

          async function ping(url, key, name) {
            if (!url || !key) return console.log(\`Skipping \${name}: Missing credentials.\`);
            const supabase = createClient(url, key);
            
            // Perform an explicit write to trigger DB activity
            const { data, error } = await supabase
              .from('project_pings')
              .insert([{}])
              .select();

            if (error) {
              console.error(\`❌ \${name} Ping Failed:\`, error.message);
            } else {
              console.log(\`✅ \${name} Pinged successfully at:\`, data[0].pinged_at);
            }
          }

          (async () => {
            await ping(process.env.SUPABASE_URL_1, process.env.SUPABASE_SERVICE_ROLE_KEY_1, 'Project One');
            await ping(process.env.SUPABASE_URL_2, process.env.SUPABASE_SERVICE_ROLE_KEY_2, 'Project Two');
          })();
          "
